<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirBank — Кликер + Инвестиции</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090d;
  --surface: #0d1119;
  --card: #111720;
  --border: #1c2535;
  --accent: #00cfff;
  --green: #00f090;
  --danger: #ff3f5e;
  --gold: #ffca3a;
  --text: #ddeeff;
  --muted: #3d5a70;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 70% 50% at 15% 0%, rgba(0,207,255,0.06) 0%, transparent 55%);
}
.page { position:relative; z-index:1; }

/* LOGIN */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:44px 40px; text-align:center; }
.login-logo { width:64px; height:64px; background:linear-gradient(135deg, rgba(0,207,255,0.2), rgba(0,240,144,0.15)); border:1px solid rgba(0,207,255,0.25); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 20px; }
.login-title { font-size:30px; font-weight:800; letter-spacing:-1px; margin-bottom:6px; }
.login-title span { color:var(--accent); }
.login-sub { font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:36px; }
.login-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; color:var(--text); font-family:var(--mono); font-size:18px; text-align:center; margin-bottom:16px; outline:none; }
.login-input:focus { border-color:var(--accent); }
.login-btn { width:100%; padding:16px; border:none; border-radius:12px; background:linear-gradient(135deg, var(--accent), #0099bb); color:#000; font-family:var(--font); font-size:15px; font-weight:700; cursor:pointer; }
.login-hint { margin-top:20px; font-family:var(--mono); font-size:11px; color:var(--muted); background:rgba(0,207,255,0.04); border-radius:10px; padding:12px; }
.login-error { display:none; background:rgba(255,63,94,0.08); color:var(--danger); border-radius:10px; padding:12px; margin-bottom:14px; }

/* MAIN */
#app-screen { display:none; }
.wrap { max-width:900px; margin:0 auto; padding:0 20px 80px; }
header { display:flex; align-items:center; justify-content:space-between; padding:22px 0 18px; border-bottom:1px solid var(--border); margin-bottom:28px; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { width:40px; height:40px; border-radius:10px; font-size:20px; background:linear-gradient(135deg, rgba(0,207,255,0.15), rgba(0,240,144,0.1)); display:flex; align-items:center; justify-content:center; }
.logo-name { font-size:21px; font-weight:800; letter-spacing:-1px; }
.logo-name span { color:var(--accent); }
.user-pill { font-family:var(--mono); font-size:12px; color:var(--accent); background:rgba(0,207,255,0.08); border:1px solid rgba(0,207,255,0.18); padding:7px 14px; border-radius:20px; }
.logout-btn { font-family:var(--mono); font-size:11px; color:var(--muted); background:none; border:1px solid var(--border); padding:7px 12px; border-radius:10px; cursor:pointer; }
.logout-btn:hover { color:var(--danger); }

/* BALANCE */
.balance-card { background:linear-gradient(135deg, #0f1725, #0a0f18); border:2px solid var(--accent); border-radius:28px; padding:30px; text-align:center; margin-bottom:24px; }
.balance-label { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:2px; }
.balance-amount { font-size:64px; font-weight:800; color:var(--gold); margin:15px 0; font-family:var(--mono); }
.click-btn { background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color:white; border:none; padding:24px; font-size:28px; font-weight:bold; border-radius:60px; cursor:pointer; width:100%; margin:20px 0; transition:transform 0.05s; }
.click-btn:active { transform:scale(0.97); }

/* TAX WARNING */
.tax-warning { background:rgba(255,63,94,0.15); border:1px solid var(--danger); border-radius:16px; padding:14px; margin:15px 0; text-align:center; font-family:var(--mono); font-size:13px; color:var(--danger); }

/* GRID */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
@media(max-width:640px){ .grid-2 { grid-template-columns:1fr; } }
.card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:22px; }
.card h3 { font-size:18px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.invest-item { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px; }
.invest-name { font-weight:700; font-size:16px; margin-bottom:8px; }
.invest-desc { font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:12px; }
.invest-stats { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:13px; }
.invest-btn { background:var(--accent); color:#000; border:none; padding:8px 16px; border-radius:30px; font-weight:bold; cursor:pointer; width:100%; }
.invest-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* INPUTS */
.finp { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-family:var(--mono); outline:none; margin-bottom:12px; }
.btn { width:100%; padding:14px; border:none; border-radius:12px; font-weight:700; cursor:pointer; margin-top:8px; }
.btn-primary { background:linear-gradient(135deg, var(--accent), #0099bb); color:#000; }
.btn-danger { background:linear-gradient(135deg, #ff3f5e, #cc0022); color:#fff; }

/* HISTORY */
.history-list { max-height:300px; overflow-y:auto; }
.history-item { padding:12px 0; border-bottom:1px solid var(--border); font-size:13px; display:flex; justify-content:space-between; }
.history-date { font-family:var(--mono); font-size:10px; color:var(--muted); }
.positive { color:var(--green); }
.negative { color:var(--danger); }

.notif { display:none; padding:12px 16px; border-radius:12px; margin-top:10px; font-size:13px; }
.notif.ok { display:flex; background:rgba(0,240,144,0.1); border:1px solid var(--green); color:var(--green); }
.notif.err { display:flex; background:rgba(255,63,94,0.1); border:1px solid var(--danger); color:var(--danger); }
</style>
</head>
<body>
<div class="page">

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">💰</div>
    <div class="login-title"><span>Air</span>Bank</div>
    <div class="login-sub">КЛИКЕР · ИНВЕСТИЦИИ · НАЛОГИ</div>
    <div class="login-error" id="login-err"></div>
    <input class="login-input" id="nick-input" placeholder="Введи свой ник..." maxlength="24">
    <button class="login-btn" onclick="doLogin()">ВОЙТИ →</button>
    <div class="login-hint">⭐ Стартовый бонус: $500<br>💸 1 клик = +$10<br>📅 Каждую неделю налог $300 (можно уходить в минус)</div>
  </div>
</div>

<div id="app-screen">
<div class="wrap">
  <header>
    <div class="logo"><div class="logo-icon">💨</div><div class="logo-name"><span>Air</span>Bank</div></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <div class="user-pill" id="hdr-nick">—</div>
      <button class="logout-btn" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <!-- Баланс и кликер -->
  <div class="balance-card">
    <div class="balance-label">ТВОЙ БАЛАНС</div>
    <div class="balance-amount" id="balance">$0</div>
    <button class="click-btn" id="clickBtn">💸 КЛИКНИ — +$10</button>
    <div class="tax-warning" id="taxWarning">⚠️ Каждую неделю налог $300 (если денег нет — уходишь в минус)</div>
  </div>

  <div class="grid-2">
    <!-- Инвестиции -->
    <div class="card">
      <h3>📈 ИНВЕСТИЦИИ</h3>
      <div id="invest-list"></div>
    </div>

    <!-- Быстрые действия -->
    <div class="card">
      <h3>⚡ БЫСТРЫЕ ДЕЙСТВИЯ</h3>
      <input class="finp" id="custom-amount" type="number" placeholder="Сумма" value="100">
      <button class="btn btn-primary" onclick="addMoney(parseFloat(document.getElementById('custom-amount').value))">➕ Добавить деньги</button>
      <button class="btn btn-danger" onclick="removeMoney(parseFloat(document.getElementById('custom-amount').value))">➖ Снять деньги</button>
      <div style="margin-top:15px; padding-top:15px; border-top:1px solid var(--border);">
        <button class="btn" style="background:var(--gold); color:#000;" onclick="forceTax()">💸 Принудительный налог (тест)</button>
      </div>
    </div>
  </div>

  <!-- История -->
  <div class="card" style="margin-top:10px;">
    <h3>📜 ИСТОРИЯ</h3>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
</div>
</div>

<script>
// ========== ДАННЫЕ ==========
let ME = null;
let userData = {}; // { balance, lastTaxWeek, investments, history, nick }

const STORAGE_KEY = 'airbank_clicker_v2';

// Инвестиционные предложения
const INVESTMENTS = [
  { id: 'startup', name: '🚀 Стартап', desc: 'Вложи $500 → через 3 дня вернётся $1000', cost: 500, profit: 1000, days: 3, active: false, startDate: null },
  { id: 'crypto', name: '₿ Крипто-фонд', desc: 'Вложи $1000 → через 5 дней вернётся $2200', cost: 1000, profit: 2200, days: 5, active: false, startDate: null },
  { id: 'realty', name: '🏠 Недвижимость', desc: 'Вложи $2000 → через 7 дней вернётся $4500', cost: 2000, profit: 4500, days: 7, active: false, startDate: null },
  { id: 'gold', name: '🥇 Золотые акции', desc: 'Вложи $300 → через 2 дня вернётся $500', cost: 300, profit: 500, days: 2, active: false, startDate: null },
  { id: 'memecoin', name: '🐕 Мемкоин', desc: 'Вложи $150 → через 1 день вернётся $250', cost: 150, profit: 250, days: 1, active: false, startDate: null }
];

// ========== СОХРАНЕНИЕ ==========
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const data = JSON.parse(raw);
      userData = data;
      // Восстанавливаем инвестиции из сохранённого состояния
      if (userData.investments) {
        INVESTMENTS.forEach(inv => {
          const saved = userData.investments.find(i => i.id === inv.id);
          if (saved) {
            inv.active = saved.active;
            inv.startDate = saved.startDate;
          }
        });
      }
    } catch(e) { console.warn(e); }
  }
  if (!userData.history) userData.history = [];
  if (!userData.investments) userData.investments = [];
}

// ========== ДОБАВИТЬ В ИСТОРИЮ ==========
function addHistory(type, amount, detail = '') {
  userData.history.unshift({
    date: Date.now(),
    type: type,
    amount: amount,
    detail: detail,
    balance: userData.balance
  });
  if (userData.history.length > 100) userData.history.pop();
  saveData();
  renderHistory();
}

// ========== ОБНОВЛЕНИЕ ИНВЕСТИЦИЙ (ПРОВЕРКА ЗАВЕРШЁННЫХ) ==========
function updateInvestments() {
  const now = Date.now();
  let changed = false;
  
  for (let inv of INVESTMENTS) {
    if (inv.active && inv.startDate) {
      const elapsedDays = (now - inv.startDate) / (1000 * 60 * 60 * 24);
      if (elapsedDays >= inv.days) {
        // Инвестиция завершена
        inv.active = false;
        userData.balance += inv.profit;
        changed = true;
        addHistory('profit', inv.profit, `💰 Инвестиция "${inv.name}" принесла $${inv.profit}`);
      }
    }
  }
  
  if (changed) {
    saveData();
    renderUI();
  }
}

// ========== ИНВЕСТИРОВАТЬ ==========
function invest(investId) {
  const inv = INVESTMENTS.find(i => i.id === investId);
  if (!inv) return;
  if (inv.active) {
    showNotif('У вас уже есть активная инвестиция этого типа!', 'err');
    return;
  }
  if (userData.balance < inv.cost) {
    showNotif(`Не хватает $${inv.cost} для инвестиции!`, 'err');
    return;
  }
  
  userData.balance -= inv.cost;
  inv.active = true;
  inv.startDate = Date.now();
  
  addHistory('invest', -inv.cost, `📊 Инвестиция: ${inv.name} ($${inv.cost})`);
  saveData();
  renderUI();
  showNotif(`✅ Инвестиция "${inv.name}" активирована! Через ${inv.days} дней вернётся $${inv.profit}`, 'ok');
}

// ========== КЛИК ==========
function clickEarn() {
  userData.balance += 10;
  addHistory('click', 10, 'Клик +$10');
  saveData();
  renderUI();
}

// ========== ДОБАВИТЬ/СНЯТЬ ДЕНЬГИ ==========
function addMoney(amount) {
  if (isNaN(amount) || amount <= 0) return;
  userData.balance += amount;
  addHistory('add', amount, `Пополнение +$${amount}`);
  saveData();
  renderUI();
}

function removeMoney(amount) {
  if (isNaN(amount) || amount <= 0) return;
  userData.balance -= amount;
  addHistory('remove', -amount, `Снятие -$${amount}`);
  saveData();
  renderUI();
}

// ========== НАЛОГ (можно уходить в минус) ==========
const TAX_AMOUNT = 300;
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

function applyTax() {
  const now = Date.now();
  const lastTax = userData.lastTaxWeek || 0;
  const weeksPassed = Math.floor((now - lastTax) / WEEK_MS);
  
  if (weeksPassed > 0 && lastTax !== 0) {
    // Снимаем налог за каждую пропущенную неделю
    for (let i = 0; i < weeksPassed; i++) {
      userData.balance -= TAX_AMOUNT;
      addHistory('tax', -TAX_AMOUNT, `📅 Налог -$${TAX_AMOUNT}`);
    }
    userData.lastTaxWeek = now;
    saveData();
    renderUI();
    if (userData.balance < 0) {
      showNotif(`⚠️ Вы ушли в минус! Баланс: $${userData.balance.toFixed(2)}`, 'err');
    }
    return weeksPassed;
  } else if (lastTax === 0) {
    // Первый вход — устанавливаем дату налога, но не списываем
    userData.lastTaxWeek = now;
    saveData();
  }
  return 0;
}

function forceTax() {
  userData.balance -= TAX_AMOUNT;
  addHistory('tax', -TAX_AMOUNT, `📅 Принудительный налог -$${TAX_AMOUNT}`);
  userData.lastTaxWeek = Date.now();
  saveData();
  renderUI();
  if (userData.balance < 0) {
    showNotif(`⚠️ Вы ушли в минус! Баланс: $${userData.balance.toFixed(2)}`, 'err');
  }
}

// ========== ОТРИСОВКА UI ==========
function renderUI() {
  if (!ME) return;
  
  document.getElementById('balance').innerHTML = `$${userData.balance.toFixed(2)}`;
  document.getElementById('hdr-nick').textContent = ME;
  
  // Инвестиции
  const investContainer = document.getElementById('invest-list');
  investContainer.innerHTML = '';
  for (let inv of INVESTMENTS) {
    const el = document.createElement('div');
    el.className = 'invest-item';
    let statusText = '';
    if (inv.active && inv.startDate) {
      const remainingDays = Math.ceil((inv.startDate + inv.days * WEEK_MS - Date.now()) / WEEK_MS);
      statusText = `<div style="color:var(--gold); font-size:11px;">⏳ Активно: осталось ${remainingDays} дн.</div>`;
    }
    el.innerHTML = `
      <div class="invest-name">${inv.name}</div>
      <div class="invest-desc">${inv.desc}</div>
      <div class="invest-stats">
        <span>💰 Вклад: $${inv.cost}</span>
        <span style="color:var(--green)">📈 Прибыль: +$${inv.profit - inv.cost}</span>
      </div>
      ${statusText}
      <button class="invest-btn" onclick="invest('${inv.id}')" ${inv.active ? 'disabled' : ''}>
        ${inv.active ? 'АКТИВНО' : `Инвестировать $${inv.cost}`}
      </button>
    `;
    investContainer.appendChild(el);
  }
  
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-list');
  if (!userData.history || userData.history.length === 0) {
    container.innerHTML = '<div style="text-align:center; color:var(--muted); padding:20px;">История пуста</div>';
    return;
  }
  
  container.innerHTML = userData.history.slice(0, 30).map(h => {
    const date = new Date(h.date).toLocaleString('ru', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
    const isPositive = h.amount > 0;
    return `
      <div class="history-item">
        <div>
          <div>${h.detail || h.type}</div>
          <div class="history-date">${date}</div>
        </div>
        <div class="${isPositive ? 'positive' : 'negative'}">${h.amount > 0 ? '+' : ''}$${h.amount.toFixed(2)}</div>
      </div>
    `;
  }).join('');
}

function showNotif(msg, type) {
  // временное уведомление через alert в этой версии, но можно расширить
  console.log(msg);
  // создаём временный попап
  const notifDiv = document.createElement('div');
  notifDiv.textContent = msg;
  notifDiv.style.cssText = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:${type === 'err' ? '#ff3f5e' : '#00f090'}; color:#000; padding:12px 24px; border-radius:40px; font-weight:bold; z-index:9999; font-family:monospace;`;
  document.body.appendChild(notifDiv);
  setTimeout(() => notifDiv.remove(), 3000);
}

// ========== ЛОГИН ==========
function doLogin() {
  const nick = document.getElementById('nick-input').value.trim();
  if (!nick) { showLoginErr('Введи ник!'); return; }
  if (nick.length < 2) { showLoginErr('Минимум 2 символа'); return; }
  
  ME = nick;
  loadData();
  
  // Если новый пользователь
  if (!userData.nick || userData.nick !== ME) {
    userData = {
      nick: ME,
      balance: 500,
      lastTaxWeek: Date.now(),
      history: [],
      investments: []
    };
    INVESTMENTS.forEach(i => { i.active = false; i.startDate = null; });
    saveData();
    addHistory('start', 500, '🏦 Стартовый бонус $500');
  } else {
    // Восстанавливаем существующего
    // инвестиции уже восстановлены в loadData
  }
  
  // Проверяем налог при входе
  applyTax();
  updateInvestments();
  
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  renderUI();
  
  // Автосохранение и проверка каждые 10 секунд
  setInterval(() => {
    if (ME) {
      updateInvestments();
      renderUI();
    }
  }, 10000);
}

function showLoginErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function doLogout() {
  ME = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('nick-input').value = '';
}

// ========== ИНИЦИАЛИЗАЦИЯ ==========
document.getElementById('clickBtn')?.addEventListener('click', clickEarn);

</script>
</body>
</html>
